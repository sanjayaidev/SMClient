<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Content Planner · Meta Scheduler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            color: #1e1e2f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 620px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 48px 52px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        .logo i { -webkit-text-fill-color: #2563eb; font-size: 36px; }
        .subtitle {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }
        .btn i { font-size: 16px; }
        .features {
            margin-top: 40px;
            text-align: left;
        }
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 15px;
            color: #334155;
        }
        .feature-item i {
            color: #2563eb;
            font-size: 18px;
            margin-top: 2px;
        }
        .nav-links {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }
        .nav-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            margin: 0 12px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #2563eb; }
        @media (max-width: 600px) {
            .container { padding: 32px 24px; }
            .logo { font-size: 26px; }
            .logo i { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><i class="fas fa-calendar-alt"></i> Content Planner</div>
    <p class="subtitle">Smart social media scheduling for Instagram, Facebook & Threads</p>

    <a href="#" class="btn" onclick="handleLogin(event)">
        <i class="fab fa-google"></i> Sign in with Google
    </a>

    <div class="features">
        <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span>Schedule posts across multiple platforms</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span>AI-powered comment replies and automation</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span>Unified calendar view for all your content</span>
        </div>
        <div class="feature-item">
            <i class="fas fa-check-circle"></i>
            <span>Analytics and performance tracking</span>
        </div>
    </div>

    <div class="nav-links">
        <a href="about.html">About</a>
        <a href="terms.html">Terms</a>
        <a href="privacy-policy.html">Privacy</a>
        <a href="data-deletion.html">Data Deletion</a>
    </div>
</div>

<script>
    function handleLogin(e) {
        e.preventDefault();
        // Google Sign-In will be initialized here
        alert('Google Sign-In integration coming soon!');
    }
</script>

</body>
</html>
