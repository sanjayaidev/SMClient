<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Insights · Meta Scheduler</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg: #f4f6fa;
            --card-bg: #ffffff;
            --text: #1e1e2f;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --sidebar-width: 220px;
            --header-height: 60px;
            --transition: 0.25s ease;
            --ig: #E4405F;
            --fb: #1877F2;
            --threads: #000000;
            --li: #0A66C2;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }
        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            flex-shrink: 0;
            transition: transform var(--transition);
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar .logo {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .sidebar .logo i { -webkit-text-fill-color: var(--primary); font-size: 24px; }
        .sidebar .logo span { -webkit-text-fill-color: var(--text); }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
            text-decoration: none;
            position: relative;
        }
        .nav-item:hover { background: #f1f5f9; color: var(--text); }
        .nav-item.active {
            background: #eff6ff;
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 3px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
        }
        .nav-item i { width: 20px; text-align: center; font-size: 16px; }

        .sidebar-footer {
            margin-top: auto;
            padding: 12px 8px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }
        .sidebar-footer .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 6px;
        }

        /* ===== MAIN CONTENT ===== */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            height: var(--header-height);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            flex-shrink: 0;
            gap: 12px;
        }
        .header .page-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header .page-title i { color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .header-actions .btn { font-size: 13px; padding: 6px 14px; }
        .header .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 30px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 500;
            font-size: 14px;
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(0.97); }
        .btn-success { background: var(--success); color: white; border: none; }
        .btn-success:hover { opacity: 0.9; transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: var(--error); color: white; border: none; }
        .btn-danger:hover { opacity: 0.9; transform: scale(0.97); }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn-xs { padding: 2px 10px; font-size: 11px; }
        .btn-ghost { background: transparent; border: none; color: var(--text-muted); }
        .btn-ghost:hover { background: #f1f5f9; }

        /* ===== TABS ===== */
        .tab-content { display: none; animation: fadeUp 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 18px 20px;
            transition: all var(--transition);
        }
        .card:hover { border-color: #cbd5e1; }
        .card-grid { display: grid; gap: 16px; }

        /* ===== INSIGHTS TABS ===== */
        .insights-platform-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .insights-platform-tabs .btn {
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-weight: 600;
        }
        .insights-platform-tabs .btn.active {
            background: var(--primary);
            color: white;
            border: none;
        }
        .insights-platform-tabs .btn[data-platform="instagram"] { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; border: none; }
        .insights-platform-tabs .btn[data-platform="facebook"] { background: var(--fb); color: white; border: none; }
        .insights-platform-tabs .btn[data-platform="threads"] { background: var(--threads); color: white; border: none; }

        .insights-level-tabs {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 3px;
            margin-bottom: 20px;
            width: fit-content;
        }
        .insights-level-tabs .btn {
            border: none;
            background: transparent;
            padding: 6px 20px;
            font-size: 13px;
            border-radius: 40px;
        }
        .insights-level-tabs .btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* ===== STATS CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .stat-card .stat-change {
            font-size: 12px;
            margin-top: 8px;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .stat-card .stat-change.positive { background: #d1fae5; color: #065f46; }
        .stat-card .stat-change.negative { background: #fee2e2; color: #991b1b; }

        /* ===== POSTS TABLE ===== */
        .posts-table-container {
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .posts-table {
            width: 100%;
            border-collapse: collapse;
        }
        .posts-table th,
        .posts-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .posts-table th {
            background: #f8fafc;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .posts-table tr:last-child td { border-bottom: none; }
        .posts-table tr:hover { background: #f8fafc; }
        .posts-table .post-preview {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .posts-table .post-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            background: #f1f5f9;
        }
        .posts-table .post-info {
            flex: 1;
            min-width: 0;
        }
        .posts-table .post-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .posts-table .post-date {
            font-size: 12px;
            color: var(--text-muted);
        }
        .posts-table .metric-cell {
            text-align: center;
            font-weight: 600;
            font-size: 14px;
        }

        /* ===== LOADING & EMPTY STATES ===== */
        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .loading-state i {
            font-size: 40px;
            margin-bottom: 16px;
            color: var(--primary);
        }
        .empty-state i {
            font-size: 40px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* ===== PLATFORM ICON ===== */
        .platform-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .platform-icon img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                z-index: 1000;
            }
            .sidebar.open { transform: translateX(0); }
            .header .hamburger { display: block; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .posts-table th,
            .posts-table td { padding: 10px 12px; font-size: 12px; }
            .posts-table .post-thumb { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fas fa-calendar-check"></i>
            <span>Meta Scheduler</span>
        </div>
        
        <nav>
            <a href="/dashboard" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="/insights" class="nav-item active">
                <i class="fas fa-chart-line"></i>
                <span>Insights</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <span class="status-dot"></span>
            <span id="connectionStatus">Connected</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <!-- Header -->
        <header class="header">
            <button class="hamburger" id="hamburgerBtn">
                <i class="fas fa-bars"></i>
            </button>
            <div class="page-title">
                <i class="fas fa-chart-line"></i>
                <span>Analytics & Insights</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i>
                    <span>Refresh</span>
                </button>
                <button class="btn btn-danger" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="content">
            <!-- Platform Side Tabs Container -->
            <div style="display: flex; gap: 20px;">
                <!-- Platform Navigation Sidebar -->
                <div style="min-width: 180px; display: flex; flex-direction: column; gap: 8px;">
                    <button class="btn active" data-platform="instagram" onclick="switchPlatform('instagram')" style="justify-content: flex-start; padding: 12px 16px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; border: none;">
                        <img src="/assets/logos/insta.webp" alt="Instagram" style="width:20px;height:20px;object-fit:contain;margin-right:10px;">
                        Instagram
                    </button>
                    <button class="btn" data-platform="facebook" onclick="switchPlatform('facebook')" style="justify-content: flex-start; padding: 12px 16px; background: var(--fb); color: white; border: none;">
                        <img src="/assets/logos/facebook.webp" alt="Facebook" style="width:20px;height:20px;object-fit:contain;margin-right:10px;">
                        Facebook
                    </button>
                    <button class="btn" data-platform="threads" onclick="switchPlatform('threads')" style="justify-content: flex-start; padding: 12px 16px; background: var(--threads); color: white; border: none;">
                        <img src="/assets/logos/Threads.png" alt="Threads" style="width:20px;height:20px;object-fit:contain;margin-right:10px;">
                        Threads
                    </button>
                </div>

                <!-- Main Insights Area -->
                <div style="flex: 1; min-width: 0;">
                    <!-- Level Tabs -->
                    <div class="insights-level-tabs">
                        <button class="btn active" data-level="account" onclick="switchLevel('account')">
                            <i class="fas fa-building"></i> Account Level
                        </button>
                        <button class="btn" data-level="posts" onclick="switchLevel('posts')">
                            <i class="fas fa-file-alt"></i> Post Level
                        </button>
                    </div>

            <!-- Account Level Content -->
            <div id="accountLevelContent" class="tab-content active">
                <div class="stats-grid" id="accountStatsGrid">
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">Followers</div>
                        <div class="stat-change positive"><i class="fas fa-arrow-up"></i> --%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">Reach</div>
                        <div class="stat-change positive"><i class="fas fa-arrow-up"></i> --%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">Engagement Rate</div>
                        <div class="stat-change negative"><i class="fas fa-arrow-down"></i> --%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">Impressions</div>
                        <div class="stat-change positive"><i class="fas fa-arrow-up"></i> --%</div>
                    </div>
                </div>
            </div>

            <!-- Post Level Content -->
            <div id="postLevelContent" class="tab-content">
                <div class="posts-table-container">
                    <table class="posts-table">
                        <thead>
                            <tr>
                                <th>Post</th>
                                <th>Date</th>
                                <th style="text-align:center;">Likes</th>
                                <th style="text-align:center;">Comments</th>
                                <th style="text-align:center;">Shares</th>
                                <th style="text-align:center;">Reach</th>
                            </tr>
                        </thead>
                        <tbody id="postsTableBody">
                            <tr>
                                <td colspan="6" class="empty-state">
                                    <i class="fas fa-inbox"></i>
                                    <p>No posts found</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

                </div> <!-- End Main Insights Area -->
            </div> <!-- End Platform Side Tabs Container -->

            <!-- Loading State -->
            <div id="loadingState" class="loading-state" style="display:none;">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading insights...</p>
            </div>
        </div>
    </main>

    <script>
        // ============================================================
        // STATE
        // ============================================================
        let currentPlatform = 'instagram';
        let currentLevel = 'account';
        let insightsData = null;

        // ============================================================
        // AUTH HELPERS
        // ============================================================
        function authHeaders() {
            const token = localStorage.getItem('auth_token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function apiFetch(url, options = {}) {
            const res = await fetch(url, {
                ...options,
                credentials: 'include',
                headers: { ...(options.headers || {}), ...authHeaders() }
            });
            if (res.status === 401) {
                localStorage.removeItem('auth_token');
                window.location.href = '/';
                return null;
            }
            return res;
        }

        // ============================================================
        // NAVIGATION
        // ============================================================
        function switchPlatform(platform) {
            currentPlatform = platform;
            
            // Update button states
            document.querySelectorAll('.insights-platform-tabs .btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.platform === platform);
            });
            
            loadInsights();
        }

        function switchLevel(level) {
            currentLevel = level;
            
            // Update button states
            document.querySelectorAll('.insights-level-tabs .btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.level === level);
            });
            
            // Toggle content visibility
            document.getElementById('accountLevelContent').classList.toggle('active', level === 'account');
            document.getElementById('postLevelContent').classList.toggle('active', level === 'posts');
            
            if (level === 'posts') {
                loadPostInsights();
            } else {
                loadAccountInsights();
            }
        }

        // ============================================================
        // DATA LOADING
        // ============================================================
        async function loadInsights() {
            showLoading(true);
            
            if (currentLevel === 'account') {
                await loadAccountInsights();
            } else {
                await loadPostInsights();
            }
            
            showLoading(false);
        }

        async function loadAccountInsights() {
            try {
                const res = await apiFetch(`/api/insights/account?platform=${currentPlatform}`);
                if (!res || !res.ok) {
                    throw new Error('Failed to load account insights');
                }
                
                const data = await res.json();
                renderAccountStats(data);
            } catch (err) {
                console.error('Error loading account insights:', err);
                renderAccountStats(null);
            }
        }

        async function loadPostInsights() {
            try {
                const res = await apiFetch(`/api/insights/posts?platform=${currentPlatform}`);
                if (!res || !res.ok) {
                    throw new Error('Failed to load post insights');
                }
                
                const data = await res.json();
                renderPostsTable(data);
            } catch (err) {
                console.error('Error loading post insights:', err);
                renderPostsTable(null);
            }
        }

        // ============================================================
        // RENDERING
        // ============================================================
        function renderAccountStats(data) {
            const grid = document.getElementById('accountStatsGrid');
            
            if (!data || !data.data) {
                // Show platform-specific labels based on currentPlatform
                let labels = {
                    instagram: ['Followers', 'Reach', 'Engagement', 'Impressions'],
                    facebook: ['Followers', 'Reach', 'Engagement', 'Impressions'],
                    threads: ['Views', 'Likes', 'Replies', 'Reposts']
                };
                let currentLabels = labels[currentPlatform] || labels.instagram;
                
                grid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">${currentLabels[0]}</div>
                        <div class="stat-change negative">No data</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">${currentLabels[1]}</div>
                        <div class="stat-change negative">No data</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">${currentLabels[2]}</div>
                        <div class="stat-change negative">No data</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">--</div>
                        <div class="stat-label">${currentLabels[3]}</div>
                        <div class="stat-change negative">No data</div>
                    </div>
                `;
                return;
            }

            const stats = data.data;
            const formatNumber = (num) => {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            };

            // Platform-specific rendering
            if (currentPlatform === 'threads') {
                grid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.views || 0)}</div>
                        <div class="stat-label">Views</div>
                        <div class="stat-change positive"><i class="fas fa-eye"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.likes || 0)}</div>
                        <div class="stat-label">Likes</div>
                        <div class="stat-change positive"><i class="fas fa-heart"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.replies || 0)}</div>
                        <div class="stat-label">Replies</div>
                        <div class="stat-change positive"><i class="fas fa-comment"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.reposts || 0)}</div>
                        <div class="stat-label">Reposts</div>
                        <div class="stat-change positive"><i class="fas fa-retweet"></i></div>
                    </div>
                `;
            } else {
                // Instagram and Facebook
                grid.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.followers || 0)}</div>
                        <div class="stat-label">Followers</div>
                        <div class="stat-change positive"><i class="fas fa-user-plus"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.reach || 0)}</div>
                        <div class="stat-label">Reach</div>
                        <div class="stat-change positive"><i class="fas fa-eye"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.engagement || 0)}</div>
                        <div class="stat-label">Engagement</div>
                        <div class="stat-change positive"><i class="fas fa-heart"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${formatNumber(stats.impressions || 0)}</div>
                        <div class="stat-label">Impressions</div>
                        <div class="stat-change positive"><i class="fas fa-chart-bar"></i></div>
                    </div>
                `;
            }
        }

        function renderPostsTable(data) {
            const tbody = document.getElementById('postsTableBody');
            
            if (!data || !data.data || data.data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>No posts found for ${currentPlatform}</p>
                        </td>
                    </tr>
                `;
                return;
            }

            const posts = data.data;
            const formatNumber = (num) => {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
                return num.toString();
            };

            const formatDate = (dateStr) => {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            };

            // Platform-specific table headers and rendering
            let headers = '<tr><th>Post</th><th>Date</th>';
            if (currentPlatform === 'threads') {
                headers += '<th style="text-align:center;">Likes</th><th style="text-align:center;">Replies</th><th style="text-align:center;">Reposts</th><th style="text-align:center;">Quotes</th></tr>';
            } else {
                headers += '<th style="text-align:center;">Likes</th><th style="text-align:center;">Comments</th><th style="text-align:center;">Shares</th><th style="text-align:center;">Reach</th></tr>';
            }

            let rows = posts.map(post => {
                let metrics;
                if (currentPlatform === 'threads') {
                    metrics = `
                        <td class="metric-cell">${formatNumber(post.likes || 0)}</td>
                        <td class="metric-cell">${formatNumber(post.comments || 0)}</td>
                        <td class="metric-cell">${formatNumber(post.reposts || 0)}</td>
                        <td class="metric-cell">${formatNumber(post.quotes || 0)}</td>
                    `;
                } else {
                    metrics = `
                        <td class="metric-cell">${formatNumber(post.likes || 0)}</td>
                        <td class="metric-cell">${formatNumber(post.comments || 0)}</td>
                        <td class="metric-cell">${formatNumber(post.shares || 0)}</td>
                        <td class="metric-cell">${formatNumber(post.reach || post.impressions || 0)}</td>
                    `;
                }

                return `
                    <tr>
                        <td>
                            <div class="post-preview">
                                <div class="platform-icon" style="background: ${getPlatformColor(currentPlatform)}; margin-right: 12px;">
                                    <img src="/assets/logos/${getPlatformLogo(currentPlatform)}" alt="${currentPlatform}" style="width:16px;height:16px;">
                                </div>
                                <div class="post-info">
                                    <div class="post-title">${escapeHtml(post.message || 'Untitled Post')}</div>
                                    <div class="post-date">${formatDate(post.date)}</div>
                                </div>
                            </div>
                        </td>
                        <td>${formatDate(post.date)}</td>
                        ${metrics}
                    </tr>
                `;
            }).join('');

            tbody.innerHTML = headers + rows;
        }

        function getPlatformColor(platform) {
            const colors = {
                instagram: 'linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888)',
                facebook: '#1877F2',
                threads: '#000000'
            };
            return colors[platform] || '#ccc';
        }

        function getPlatformLogo(platform) {
            const logos = {
                instagram: 'insta.webp',
                facebook: 'facebook.webp',
                threads: 'Threads.png'
            };
            return logos[platform] || 'instagram.svg';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading(show) {
            document.getElementById('loadingState').style.display = show ? 'block' : 'none';
            document.getElementById('accountLevelContent').style.opacity = show ? '0.5' : '1';
            document.getElementById('postLevelContent').style.opacity = show ? '0.5' : '1';
        }

        // ============================================================
        // MOBILE MENU
        // ============================================================
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');

        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                !hamburgerBtn.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        // ============================================================
        // LOGOUT
        // ============================================================
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await apiFetch('/api/auth/logout', { method: 'POST' });
            localStorage.removeItem('auth_token');
            window.location.href = '/';
        });

        // ============================================================
        // REFRESH
        // ============================================================
        document.getElementById('refreshBtn').addEventListener('click', () => {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            loadInsights().finally(() => {
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh';
            });
        });

        // ============================================================
        // INITIALIZATION
        // ============================================================
        async function checkAuthAndInit() {
            const token = localStorage.getItem('auth_token');
            const res = await fetch('/api/auth/me', { credentials: 'include', headers: authHeaders() });
            if (!res.ok) {
                localStorage.removeItem('auth_token');
                window.location.href = '/';
                return;
            }
            
            // Load initial insights
            loadInsights();
        }

        checkAuthAndInit();

        console.log('📊 Insights page ready!');
    </script>
</body>
</html>
